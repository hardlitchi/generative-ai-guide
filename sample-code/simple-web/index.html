<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIと作った最初のWebサイト</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            padding: 50px;
            color: #333;
        }
        h1 {
            color: #007bff;
        }
        .container {
            background-color: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        #message {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ AIと作ったWebサイトへようこそ！</h1>
        <p>
            これは、あなたがAIと一緒に作り上げた最初のページです。<br>
            ボタンを押して、何かが起きる瞬間を体験してみましょう。
        </p>
        <button id="magicButton">魔法のボタンを押す</button>
        <div id="message"></div>
    </div>

    <!-- main.jsを読み込んで、動きをつけます -->
    <script src="main.js"></script>
</body>
</html>
